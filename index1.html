<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Nautical Loader</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117; /* Deep ocean background */
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* --- Loader Container --- */
        #immersive-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 9999;
            background: linear-gradient(to bottom, #111b2b, #00101d);
        }

        /* --- Windsurfer Illustration (Placeholder for detailed vector) --- */
        .surfer-illustration {
            position: absolute;
            width: 80%;
            height: 80%;
            background: url('path/to/your/windsurfer_art.svg') no-repeat center center / contain;
            /* Placeholder pattern for demonstration: */
            background-image: linear-gradient(45deg, rgba(2, 80, 145, 0.2) 25%, transparent 25%),
                              linear-gradient(-45deg, rgba(2, 80, 145, 0.2) 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, rgba(2, 80, 145, 0.2) 75%),
                              linear-gradient(-45deg, transparent 75%, rgba(2, 80, 145, 0.2) 75%);
            background-size: 10px 10px;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
        }

        /* --- Dynamic Water Splash Curtain --- */
        .splash-curtain {
            position: absolute;
            bottom: -5%; /* Just below the surfer base */
            left: -10%;
            width: 120%;
            height: 10%; /* Initial small splash */
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.7) 0%, rgba(100, 200, 255, 0.3) 50%, transparent 100%);
            border-radius: 50% / 100% 100% 0 0;
            z-index: 15;
            transform-origin: bottom center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            opacity: 0;
        }

        /* Multiple layered splashes for depth */
        .splash-layer-1 { background-color: rgba(255, 255, 255, 0.8); z-index: 18; height: 12%; }
        .splash-layer-2 { background-color: rgba(100, 200, 255, 0.5); z-index: 17; height: 14%; }
        .splash-layer-3 { background-color: rgba(0, 128, 255, 0.3); z-index: 16; height: 16%; }

        /* --- Integrated Progress Text --- */
        .loader-text {
            position: relative;
            z-index: 20;
            text-align: center;
            opacity: 0;
        }

        .primary-text {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #fff;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            text-transform: uppercase;
        }

        .secondary-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.4em;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            margin-top: -10px;
        }

        .percentage-counter {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            color: #fff;
            margin-top: 20px;
            filter: blur(5px);
            opacity: 0;
        }

        /* --- Content Area --- */
        #content {
            padding: 50px;
            display: none;
            opacity: 0;
        }

        #content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
        }
    </style>
</head>
<body>

    <div id="immersive-loader">

        <div class="surfer-illustration"></div>

        <div class="splash-curtain splash-layer-1"></div>
        <div class="splash-curtain splash-layer-2"></div>
        <div class="splash-curtain splash-layer-3"></div>

        <div class="loader-text">
            <div class="primary-text">HARNESS THE WIND</div>
            <div class="secondary-text">SETTING SAIL</div>
            <div class="percentage-counter">0%</div>
        </div>

    </div>

    <div id="content">
        <h1>Welcome Aboard</h1>
        <p>The Immersive Voyage has Begun.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            // 1. Initial State Setups
            gsap.set(".surfer-illustration", { scale: 0.8, opacity: 0 });
            gsap.set(".primary-text, .secondary-text", { y: 20 });
            gsap.set(".percentage-counter", { y: 20, blur: 5 });

            // 2. The Main Animation Timeline
            const tl = gsap.timeline();

            // Entry Animation: Revealing the scene
            tl.to(".surfer-illustration", {
                scale: 1,
                opacity: 1,
                duration: 1.5,
                ease: "power2.out"
            })
            .to(".loader-text", {
                opacity: 1,
                duration: 0.8
            }, "-=0.8")
            .to(".primary-text", {
                y: 0,
                duration: 0.8,
                ease: "back.out(1.7)"
            }, "-=0.5")
            .to(".secondary-text", {
                y: 0,
                duration: 0.8,
                ease: "power2.out"
            }, "-=0.6")
            .to(".percentage-counter", {
                opacity: 1,
                blur: 0,
                y: 0,
                duration: 0.8,
                ease: "power2.out"
            }, "-=0.4")
            .addLabel("start_splash");

            // Continuous Wind and Bobbing Effect (Parallel to splash)
            gsap.to(".surfer-illustration", {
                y: "-=10",
                rotation: 1,
                duration: 2,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });

            // 3. Immersive Splash Progression (0% to 100%)
            // The splash scale and opacity increase as loading progresses
            tl.staggerTo(".splash-curtain", 2.5, {
                opacity: 1,
                scaleY: 10, /* Splashes explode upwards */
                height: "100%", /* Fills the screen height */
                ease: "power3.inOut"
            }, 0.2, "start_splash")
            .to(".splash-curtain", {
                scaleX: 1.5, /* Splashes widen */
                ease: "power3.inOut"
            }, "start_splash");

            // Percentage Counter Animation (0% to 100%)
            const counterElement = document.querySelector('.percentage-counter');
            tl.to({ value: 0 }, {
                value: 100,
                duration: 3,
                ease: "power1.in",
                onUpdate: function() {
                    const roundedValue = Math.round(this.targets()[0].value);
                    counterElement.innerHTML = roundedValue + "%";

                    // Add subtle glow based on progress
                    const blurValue = (100 - roundedValue) / 10;
                    gsap.set(counterElement, { filter: `blur(${blurValue}px)` });
                }
            }, "start_splash");

            // Transition: Exit Animation at 100%
            tl.to("#immersive-loader", {
                opacity: 0,
                duration: 1,
                ease: "power2.inOut",
                onComplete: () => {
                    // Hide the loader and reveal content
                    document.getElementById("immersive-loader").style.display = "none";
                    document.getElementById("content").style.display = "block";
                    document.body.style.overflow = "auto";

                    gsap.to("#content", {
                        opacity: 1,
                        y: -20,
                        duration: 1
                    });
                }
            });

        });
    </script>
</body>
</html>
