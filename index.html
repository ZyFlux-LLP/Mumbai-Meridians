<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Water Loader - Windsurfing Theme</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050a15; /* Deep night sky background */
            color: #fff;
            overflow: hidden;
        }

        /* The Loader Container */
        #water-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background-color: #050a15;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Canvas for the realistic fluid */
        #water-canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Text UI Container */
        .ui-container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; /* Lets clicks pass through if needed */
        }

        .title-text {
            font-size: 1.5rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .percentage {
            font-size: 5rem;
            font-weight: 800;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Main Content */
        #main-content {
            position: relative;
            z-index: 0;
            padding: 50px;
            text-align: center;
            opacity: 0;
        }

        #main-content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="water-loader">
        <canvas id="water-canvas"></canvas>

        <div class="ui-container">
            <div class="title-text" id="status-text">Catching the Wind</div>
            <div class="percentage" id="percent-text">0%</div>
        </div>
    </div>

    <div id="main-content">
        <h1>Welcome to the Ocean</h1>
        <p>The wind is howling and the water is perfect.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            // --- Canvas Setup ---
            const canvas = document.getElementById('water-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // --- Fluid & Physics Variables ---
            // This object is what GSAP will animate
            const loadState = { progress: 0 };
            let time = 0;
            const bubbles = [];

            // Create some random bubbles for realism
            for (let i = 0; i < 60; i++) {
                bubbles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 4 + 1,
                    speed: Math.random() * 3 + 1,
                    wobble: Math.random() * Math.PI * 2
                });
            }

            // --- The Rendering Loop ---
            function drawWater() {
                ctx.clearRect(0, 0, width, height);

                // Calculate where the surface of the water should be based on GSAP's progress
                // progress goes 0 to 100. targetY goes from bottom (height) to top (0).
                const targetY = height - (loadState.progress / 100) * height;

                time += 0.05;

                // 1. Draw Bubbles inside the water
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                bubbles.forEach(b => {
                    // Only draw bubbles if they are below the water line
                    if (b.y > targetY) {
                        ctx.beginPath();
                        ctx.arc(b.x + Math.sin(time + b.wobble) * 5, b.y, b.radius, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Move bubbles up
                    b.y -= b.speed;
                    // Reset bubble to the bottom if it hits the surface
                    if (b.y < targetY) {
                        b.y = height + 10;
                        b.x = Math.random() * width;
                    }
                });

                // 2. Draw Realistic Overlapping Waves
                // We draw 3 layers of waves with slightly different colors and speeds for a 3D effect
                const waveLayers = [
                    { color: 'rgba(0, 105, 170, 0.6)', offset: 0, amplitude: 15, frequency: 0.01 },
                    { color: 'rgba(0, 140, 200, 0.8)', offset: 2, amplitude: 20, frequency: 0.008 },
                    { color: 'rgba(2, 60, 110, 1)',    offset: 4, amplitude: 10, frequency: 0.012 }
                ];

                waveLayers.forEach(layer => {
                    ctx.beginPath();
                    ctx.moveTo(0, height);

                    // Draw the top curved edge of the water
                    for (let x = 0; x <= width; x += 10) {
                        // The sine wave math creates the rolling fluid look
                        const y = targetY + Math.sin(x * layer.frequency + time + layer.offset) * layer.amplitude;
                        ctx.lineTo(x, y);
                    }

                    ctx.lineTo(width, height);
                    ctx.lineTo(0, height);
                    ctx.fillStyle = layer.color;
                    ctx.fill();
                });

                // Keep looping the canvas draw function
                requestAnimationFrame(drawWater);
            }

            // Start the canvas rendering
            drawWater();

            // --- GSAP Animation Sequence ---
            const tl = gsap.timeline();
            const percentText = document.getElementById("percent-text");
            const statusText = document.getElementById("status-text");

            // Animate the loadState object from 0 to 100 over 4 seconds
            tl.to(loadState, {
                progress: 100,
                duration: 4.5,
                ease: "power2.inOut",
                onUpdate: () => {
                    // Update the text on screen as the number goes up
                    percentText.innerText = Math.round(loadState.progress) + "%";

                    // Change the text dynamically as water rises
                    if (loadState.progress > 40 && loadState.progress < 80) {
                        statusText.innerText = "Rigging the sail...";
                    } else if (loadState.progress >= 80) {
                        statusText.innerText = "Ready for launch.";
                    }
                }
            })
            // Exit Animation once water hits the top
            .to("#water-loader", {
                opacity: 0,
                duration: 1.5,
                ease: "power2.inOut",
                delay: 0.5, // Hold for half a second when full
                onComplete: () => {
                    document.getElementById("water-loader").style.display = "none";
                    document.body.style.overflow = "auto";

                    // Reveal Main Content
                    gsap.to("#main-content", {
                        opacity: 1,
                        y: -30,
                        duration: 1.5,
                        ease: "power3.out"
                    });
                }
            });

        });
    </script>
</body>
</html>
